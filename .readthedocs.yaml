version: 2

# 这里的 build 后面是一个冒号，下方的 os, tools 等必须缩进 2 个空格
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    - fonts-noto-cjk
    - fonts-noto-cjk-extra
    - texlive-lang-chinese
    - texlive-xetex
    - texlive-latex-extra
    - latexmk
    - librsvg2-bin 

python:
  install:
    - requirements: requirements.txt

sphinx:
  configuration: source/conf.py